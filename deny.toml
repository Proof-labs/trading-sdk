# cargo-deny configuration for the Proof trading SDK.
# Run: `cargo deny check`

[advisories]
# Fail on any RustSec advisory affecting the dependency tree.
yanked = "deny"
# No advisories are ignored. Upgrade the offending crate instead of adding
# an ignore here; an ignore is a documented, time-boxed exception only.
ignore = []

[licenses]
# Permissive licenses acceptable for an Apache-2.0 published SDK.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
]
confidence-threshold = 0.8
# Don't fail when an allowed license isn't present in the tree; the allow-list
# is intentionally a superset of what's currently pulled in.
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
# Deny registry wildcard deps, but allow workspace-internal `path = ...` deps
# (the spec/fuzz crates are publish = false and depend on the core by path).
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
